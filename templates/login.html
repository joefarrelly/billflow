<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Billflow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #F5F0E8;
      --surface: #EDE7DA;
      --ink: #3A2F28;
      --ink-muted: #7A6A60;
      --accent: #C4623A;
      --accent-light: #D97A52;
      --border: rgba(58,47,40,.12);
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 44px;
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: var(--accent);
      letter-spacing: -.5px;
      margin-bottom: 6px;
    }
    .tagline {
      font-size: .8rem;
      color: var(--ink-muted);
      margin-bottom: 36px;
    }
    .btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      padding: 11px 18px;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: .875rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: opacity .15s, background .15s;
      border: none;
    }
    .btn-google {
      background: #fff;
      color: #3A2F28;
      border: 1px solid var(--border);
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
      margin-bottom: 10px;
    }
    .btn-google:hover { opacity: .9; }
    .btn-demo {
      background: transparent;
      color: var(--ink-muted);
      border: 1px solid var(--border);
      font-size: .82rem;
    }
    .btn-demo:hover { background: rgba(58,47,40,.05); color: var(--ink); }
    .demo-row {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .demo-row a { flex: 1; }
    .demo-note {
      font-size: .7rem;
      color: var(--ink-muted);
      white-space: nowrap;
    }
    .divider {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 4px 0 14px;
    }
    .divider-line { flex: 1; height: 1px; background: var(--border); }
    .divider-text { font-size: .72rem; color: var(--ink-muted); }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Billflow</div>
    <div class="tagline">Track your subscriptions</div>

    <a href="/auth/google" class="btn btn-google">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57C21.36 18.1 22.56 15.3 22.56 12.25z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84C6.71 7.31 9.14 5.38 12 5.38z" fill="#EA4335"/>
      </svg>
      Sign in with Google
    </a>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-text">or</div>
      <div class="divider-line"></div>
    </div>

    <div class="demo-row">
      <a href="/auth/demo" class="btn btn-demo">Try demo</a>
      <span class="demo-note">read-only</span>
    </div>
  </div>
</body>
</html>
