# Local dev only. Production service lives in ~/apps/docker-compose.yml on the server.
# Requires the shared postgres: run `docker compose up -d` from web/ first.
name: billflow
services:
  web:
    build: .
    command: sh -c "alembic upgrade head && flask run --host=0.0.0.0 --port=5003 --debug"
    volumes:
      - .:/app
    ports:
      - "5003:5003"
    env_file: .env
    environment:
      - FLASK_APP=app.py
      - AUTHLIB_INSECURE_TRANSPORT=1
      - DATABASE_URL=postgresql+psycopg2://billflow:billflow@postgres:5432/billflow
    restart: on-failure

networks:
  default:
    name: web
    external: true
